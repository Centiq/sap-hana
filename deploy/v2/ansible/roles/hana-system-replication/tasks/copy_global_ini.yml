---

- name: Ensure global.ini is copied from the primary node
  # If HSR is already enabled, we don't do this
  when: not hana_system_replication_enabled
  become_user: "{{ sid_admin_user }}"
  block:
    - name: Ensure global.ini present on the local host
      when: ansible_hostname == hana_database.nodes[0].dbname
      block:

        - name: Ensure there is a local copy of Primary global.ini file
          fetch:
            src: "{{ path_global_ini }}"
            dest: "{{ tmp_global_ini }}"
            flat: yes

    - name: Ensure the Primary node global.ini is placed on the Secondary node
      when: ansible_hostname != hana_database.nodes[0].dbname
      block:

        - name: Check global.ini backup file exists on the Secondary node
          stat:
            path: "{{ path_global_ini }}.bak"
          register: global_ini_file_backup_result

        - name: Ensure global.ini file is backed up on the Secondary node
          file:
            src: "{{ path_global_ini }}"
            path: "{{ path_global_ini }}.bak"
            state: hard
          when: global_ini_file_backup_result.stat.exists == false

        - name: Ensure original global.ini file is removed on the Secondary node
          file:
            path: "{{ path_global_ini }}"
            state: absent

        - name: Ensure the Primary node global.ini file is placed on the Secondary node
          copy:
            src: "{{ tmp_global_ini }}"
            dest: "{{ path_global_ini }}"
            owner: "{{ sid_admin_user }}"
            group: "{{ hana_group }}"
            mode: 0644
