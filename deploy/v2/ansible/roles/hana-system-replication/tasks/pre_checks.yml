---

- name: Check HANA system replication variables are set and seem valid
  assert:
    that:
      - "hana_group | trim | length != 0"
      - "sid | trim | regex_search('^[A-Za-z][A-Za-z\\d][A-Za-z\\d]$') | length == 3"
      - "instance_number | trim | regex_search('^\\d\\d$') | length == 2"
      - "hana_system_user | trim | length != 0"
      - "hana_dir | trim | length != 0"
      - "sap_dir | trim | length != 0"
      - "tmp_ssfs_dir | trim | length != 0"
      - "hana_stop_start_timeout | trim | length != 0"
      - "hana_stop_start_delay | trim | length != 0"

- name: "Check that HANA directory {{ hana_dir }} exists"
  block:
    - stat:
        path: "{{ hana_dir }}"
      register: p
      tags:
        - skip_ansible_lint

    - fail:
        msg: "{{ hana_dir }} is not a directory"
      when: not (p.stat.isdir is defined and p.stat.isdir)
      tags:
        - skip_ansible_lint

- name: "Check that SAP directory {{ sap_dir }} exists"
  block:
    - stat:
        path: "{{ sap_dir }}"
      register: p
      tags:
        - skip_ansible_lint

    - fail:
        msg: "{{ sap_dir }} does not exist"
      when: not (p.stat.isdir is defined and p.stat.isdir)
      tags:
        - skip_ansible_lint

- name: "Check that HANA IDX SVR file {{ path_idx_svr }} exists"
  block:
    - stat:
        path: "{{ path_idx_svr }}"
      register: p
      tags:
        - skip_ansible_lint

    - fail:
        msg: "HANA IDX SVR file {{ path_idx_svr }} does not exist"
      when: p.stat.exists == false
      tags:
        - skip_ansible_lint

- name: "Check if HANA DB Util {{ path_hdbnsutil }} exists"
  block:
    - stat:
        path: "{{ path_hdbnsutil }}"
      register: p
      tags:
        - skip_ansible_lint

    - fail:
        msg: "{{ path_hdbnsutil }} does not exist"
      when: p.stat.exists == false
      tags:
        - skip_ansible_lint

- name: Check that HANA admin user {{ sid_admin_user }} exists
  shell: "id {{ sid_admin_user }}"
  changed_when: false
  become: true
  tags:
    - skip_ansible_lint

- name: Check that HANA system user ({{ hana_system_user }}) can access the SYSTEM database
  become_user: "{{ sid_admin_user }}"
  shell: >
    source ~/.bashrc ;
    {{ hdbsql_command }} -n {{ hana_container_address }} '{{ dummy_cmd }}'
  changed_when: false

- name: Check that HANA system user ({{ hana_system_user }}) can access the tenant database {{ hana_tenant_database_name }}
  become_user: "{{ sid_admin_user }}"
  shell: >
    source ~/.bashrc ;
    {{ hdbsql_command }} -n {{ hana_tenant_address }} '{{ dummy_cmd }}'
  changed_when: false

- name: Check HANA log mode is set to normal
  become_user: "{{ sid_admin_user }}"
  shell: >
    {{ hdbsql_command }} "{{ get_log_mode_cmd }}"
  register: p
  failed_when: p.rc != 0 or ("normal" not in p.stdout)
  changed_when: false
  tags:
    - skip_ansible_lint
