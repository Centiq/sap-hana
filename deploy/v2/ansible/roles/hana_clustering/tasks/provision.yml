---

- name: Configure replication
  block:
    - name: Ensure Primary node is configured for System Replicaiton
      block:
        - import_tasks: set_global_ini_value.yml
        - import_tasks: stop_hana.yml
        - import_tasks: start_hana.yml

        - name: Ensure Primary node is configured for System Replicaiton
          shell: "source ~/.bashrc ; {{ path_hdbnsutil }} -sr_enable --name=SITEA"
          register: p
          # rc == 102 means nameserver is already active
          failed_when: p.rc != 0 and p.rc != 102
          # Ignore lack of idempotency temporarily until a good solution is known
          tags:
            - skip_ansible_lint

        - name: Check replication state on primary
          shell: "source ~/.bashrc ; {{ path_hdbnsutil }} -sr_state | grep 'mode: primary'"
          changed_when: False
      when: ansible_hostname == output.databases[0].nodes[0].dbname

    - name: Ensure System Replication is configured
      block:
        - import_tasks: set_global_ini_value.yml
        - import_tasks: stop_hana.yml

        - name: Ensure Secondary node is registered as secondary in replication
          shell: >
            source ~/.bashrc ; {{ path_hdbnsutil }} -sr_register --remoteHost={{ output.databases[0].nodes[0].dbname }}
            --remoteInstance={{ instance_number }} --replicationMode=sync
            --operationMode=logreplay --name=SITEB
          # Ignore lack of idempotency temporarily until a good solution is known
          tags:
            - skip_ansible_lint

        - import_tasks: start_hana.yml
      when: ansible_hostname != output.databases[0].nodes[0].dbname
