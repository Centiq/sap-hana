---

- hosts: scs
  vars:
    output: "{{ lookup('file', '~/output.json') | from_json }}"
    # sapbits_location_base_path: "https://npeus2saplibb546.blob.core.windows.net/sapbits"
    sapbits_location_base_path: "https://{{ output.software.storage_account_sapbits.name }}.file.core.windows.net/{{ output.software.storage_account_sapbits.file_share_name }}"
    bom_base_name: "S4HANA_1909_SP2_v002"
    target_media_location: /usr/sap/install/download_basket
    app_sid: Z01
    test_mode: true

  roles:

    - role: os-disk-setup
    - role: mount-azure-files
    - role: process_bom
    - role: nfs-server-setup
    - role: scs-install
