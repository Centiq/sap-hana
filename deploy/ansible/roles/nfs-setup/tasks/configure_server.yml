---

- name: Ensure NFS is enabled
  systemd:
    name: nfs
    state: started

- name: Ensure expected base directories are present
  file:
    path: "{{ item }}"
    state: directory
    mode: +r
  with_items:
    - "/usr/sap/install"
    - "/tmp/app_template"
    - "/sapmnt/{{ app_sid | upper }}/global"
    - "/sapmnt/{{ app_sid | upper }}/profile"

- name: Ensure exports file exists
  template:
    src: exports.j2
    dest: /etc/exports
    owner: root
    group: root
    mode: 0644

- name: Ensure nfsserver is running
  systemd:
    state: started
    name: nfsserver
    daemon_reload: yes
